<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5,6장 과제</title>
    <style>
        h1{
            text-align: center;
            font-weight: bold;
        }
        p{
            font-size: 20px;
        }
        span{
            font-weight: bold;
        }
        
        #text{
            background-color: lightpink;
        }
        #password{
            background-color: skyblue;
        }
        div{
            width: 120px;
            height: 50px;
            background-color: orange;
            color: white;
            text-align: center;
            line-height: 50px;
            border-radius: 15px;
        }

    </style>
</head>
<body>
    <h1>김태성 자기소개</h1>
    <p>23학번 컴퓨터 공학과 김태성</p>
    <p>저는 1학년 2학기가 끝난 후 군입대하여 작년8월에 전역하여 올해 1학기에 2학년으로 복학하게되었습니다. <br>
        군대 말년에 <span>다리를 좀 다쳐서(전방십자인대 파열) 재활치료</span>때문에 작년 2학기에 바로 복학은 못했습니다.
    </p>

    <table>
        <tr>
            <td><label for="text">텍스트</label></td>
            <td><input type="text" id="text"></td>
        </tr>
        <tr>
            <td><label for="text">비밀번호</label></td>
            <td><input type="password" id="password"></td>
        </tr>
    </table>

    <div>
        <a href="#">Click</a>
    </div>



</body>
</html>
